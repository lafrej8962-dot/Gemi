<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List Application</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>My To-Do List</h1>
            <p class="subtitle">Stay organized and productive</p>
        </header>

        <div class="input-section">
            <div class="input-group">
                <input 
                    type="text" 
                    id="todoInput" 
                    placeholder="Add a new task..."
                    autocomplete="off"
                >
                <button id="addBtn" class="btn btn-add">Add</button>
            </div>
            <div class="filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>
        </div>

        <div class="stats">
            <span class="stat-item">Total: <strong id="totalCount">0</strong></span>
            <span class="stat-item">Active: <strong id="activeCount">0</strong></span>
            <span class="stat-item">Completed: <strong id="completedCount">0</strong></span>
        </div>

        <ul id="todoList" class="todo-list">
            <!-- Tasks will be dynamically added here -->
        </ul>

        <div class="empty-state" id="emptyState">
            <p>📝 No tasks yet. Add one to get started!</p>
        </div>

        <div class="actions">
            <button id="clearCompletedBtn" class="btn btn-secondary">Clear Completed</button>
            <button id="clearAllBtn" class="btn btn-danger">Clear All</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
